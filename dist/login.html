<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme') || 'system';
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme === 'system' ? (prefersDark ? 'dark' : 'light') : savedTheme;
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录</title>
  <link href="/daisyui@5.css" rel="stylesheet" type="text/css">
  <script src="/tailwindcss@4.js"></script>
  <style>
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
  </style>
</head>
<body class="bg-base-200 text-base-content">
  <div class="absolute right-4 top-4">
    <button id="theme-toggle-btn" class="btn btn-ghost btn-circle" type="button" aria-label="切换主题">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="h-6 w-6">
        <path id="theme-toggle-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
      </svg>
    </button>
  </div>

  <main class="flex min-h-screen items-center justify-center px-4 py-8">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
      <div class="card-body gap-5 p-8">
        <div class="text-center">
          <h1 class="text-2xl font-bold">登录</h1>
          <p class="mt-2 text-sm text-base-content/60">输入管理密码进入后台</p>
        </div>
        <label class="form-control">
          <span class="label-text mb-2">管理密码</span>
          <input id="password" type="password" class="input input-bordered w-full" placeholder="请输入管理密码" autocomplete="current-password">
        </label>
        <button id="login-btn" type="button" class="btn btn-primary">登 录</button>
        <div id="error-box" class="alert alert-error hidden">
          <span id="error-text">密码错误，请重试</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-t border-base-300 bg-base-100/80 py-4 text-center text-sm text-base-content/60 backdrop-blur">
    <p>
      GitHub:
      <a href="https://github.com/xxnuo/serverless-qrcode-hub" class="link link-primary" target="_blank">xxnuo/serverless-qrcode-hub</a>
    </p>
  </footer>

  <script>
    const elements = {
      themeToggleBtn: document.getElementById('theme-toggle-btn'),
      themeTogglePath: document.getElementById('theme-toggle-path'),
      password: document.getElementById('password'),
      loginBtn: document.getElementById('login-btn'),
      errorBox: document.getElementById('error-box'),
      errorText: document.getElementById('error-text')
    };

    function getThemeMode() {
      return localStorage.getItem('theme') || 'system';
    }

    function updateThemeIcon(mode) {
      if (mode === 'system') {
        elements.themeTogglePath.setAttribute('d', 'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z');
      } else if (mode === 'light') {
        elements.themeTogglePath.setAttribute('d', 'M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z');
      } else {
        elements.themeTogglePath.setAttribute('d', 'M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z');
      }
    }

    function applyTheme(mode) {
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const actual = mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
      document.documentElement.setAttribute('data-theme', actual);
      updateThemeIcon(mode);
    }

    function cycleTheme() {
      const current = getThemeMode();
      const next = current === 'system' ? 'light' : current === 'light' ? 'dark' : 'system';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    function setError(message) {
      elements.errorText.textContent = message;
      elements.errorBox.classList.remove('hidden');
    }

    function hideError() {
      elements.errorBox.classList.add('hidden');
    }

    async function request(url, options = {}) {
      const init = { method: options.method || 'GET', headers: { ...(options.headers || {}) } };
      if (options.body !== undefined) {
        init.headers['Content-Type'] = 'application/json';
        init.body = JSON.stringify(options.body);
      }
      const response = await fetch(url, init);
      const contentType = response.headers.get('content-type') || '';
      const payload = contentType.includes('application/json') ? await response.json() : await response.text();
      if (!response.ok) {
        if (typeof payload === 'object' && payload && payload.error) {
          throw new Error(payload.error);
        }
        throw new Error(typeof payload === 'string' ? payload : '请求失败');
      }
      return payload;
    }

    async function checkSession() {
      try {
        await request('/api/session');
        location.href = '/admin';
      } catch {
      }
    }

    async function login() {
      const password = elements.password.value;
      if (!password) {
        setError('请输入管理密码');
        elements.password.focus();
        return;
      }
      hideError();
      elements.loginBtn.disabled = true;
      elements.loginBtn.innerHTML = '<span class="loading loading-spinner loading-sm"></span>登录中...';
      try {
        await request('/api/login', { method: 'POST', body: { password } });
        elements.loginBtn.innerHTML = '登录成功';
        location.href = '/admin';
      } catch (error) {
        setError(error.message || '登录失败，请重试');
        elements.loginBtn.disabled = false;
        elements.loginBtn.textContent = '登 录';
      }
    }

    function init() {
      applyTheme(getThemeMode());
      elements.themeToggleBtn.addEventListener('click', cycleTheme);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (getThemeMode() === 'system') {
          applyTheme('system');
        }
      });
      elements.loginBtn.addEventListener('click', login);
      elements.password.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          login();
        }
      });
      elements.password.focus();
      checkSession();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
